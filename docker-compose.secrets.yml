version: '3.8'

# Docker Secrets configuration for production use
# This file demonstrates how to use Docker secrets for sensitive data

services:
  app:
    secrets:
      - ai_api_key
      - ark_api_key
      - secret_key
    environment:
      # Override environment variables to read from secrets
      - AI_API_KEY_FILE=/run/secrets/ai_api_key
      - ARK_API_KEY_FILE=/run/secrets/ark_api_key
      - SECRET_KEY_FILE=/run/secrets/secret_key

secrets:
  ai_api_key:
    file: ./secrets/ai_api_key.txt
  ark_api_key:
    file: ./secrets/ark_api_key.txt
  secret_key:
    file: ./secrets/secret_key.txt
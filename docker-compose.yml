version: "3.9"

services:
  app:
    build: .
    container_name: ai_report_app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PORT=8000
      - REPORTS_DIR=/app/student_reports
      - OUTPUT_DIR=/app/graded_reports
      - TEMP_DIR=/app/tmp
      - LOGS_DIR=/app/logs
    volumes:
      - ai_report_student_reports:/app/student_reports
      - ai_report_graded_reports:/app/graded_reports
      - ai_report_output_data:/app/output_data
      - ai_report_app_logs:/app/logs
      - ai_report_nginx_logs:/app/nginx_logs
    tmpfs:
      - /app/tmp:size=512m   # 临时缓存目录，用内存挂载，容器停止后自动清空
    networks:
      - grading-network
    restart: unless-stopped

volumes:
  ai_report_student_reports:
  ai_report_graded_reports:
  ai_report_output_data:
  ai_report_app_logs:
  ai_report_nginx_logs:

networks:
  grading-network:
